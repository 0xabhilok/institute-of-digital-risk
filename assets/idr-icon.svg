<!--
  IDR Logo — Icon Only Variant
  Isometric cube representing structure, resilience, and layered digital risk
  Colours: #F97316 (orange top face), #111827 (dark left), #7C2D12 (shadow right)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Institute of Digital Risk icon">

  <defs>
    <!-- Top face gradient: bright orange -->
    <linearGradient id="g-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <!-- Left face: near-black -->
    <linearGradient id="g-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <!-- Right face: dark orange-brown (shadow) -->
    <linearGradient id="g-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
  </defs>

  <!-- Top face (parallelogram) -->
  <polygon
    points="32,6  56,19  32,32  8,19"
    fill="url(#g-top)"
  />

  <!-- Left face -->
  <polygon
    points="8,19  32,32  32,58  8,45"
    fill="url(#g-left)"
  />

  <!-- Right face -->
  <polygon
    points="32,32  56,19  56,45  32,58"
    fill="url(#g-right)"
  />

  <!-- Subtle top edge highlight -->
  <polyline
    points="8,19  32,6  56,19"
    fill="none"
    stroke="#FED7AA"
    stroke-width="0.6"
    stroke-opacity="0.7"
  />

  <!-- Vertical centre edge -->
  <line
    x1="32" y1="32" x2="32" y2="58"
    stroke="#111827"
    stroke-width="0.4"
    stroke-opacity="0.4"
  />

</svg>
